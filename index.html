<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NutriLog</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --border: #E8E4DC;
  --text: #1A1A18; --muted: #8A8880;
  --green: #2D6A4F; --green-bg: #EAF3EE;
  --amber: #92400E; --amber-bg: #FEF3C7;
  --red: #9B1C1C; --red-bg: #FEE2E2;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
.app { max-width: 520px; margin: 0 auto; }
.header { margin-bottom: 2rem; }
.header h1 { font-size: 28px; font-weight: 500; letter-spacing: -0.5px; margin-bottom: 4px; }
.header p { font-size: 14px; color: var(--muted); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; }
.card h3 { font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.card p { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.5; }
.key-row { display: flex; gap: 8px; }
.key-input { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; font-size: 13px; font-family: 'DM Mono', monospace; background: var(--bg); color: var(--text); }
.key-input:focus { outline: none; border-color: var(--text); }
.key-btn { padding: 10px 18px; background: var(--text); color: white; border: none; border-radius: 10px; font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; }
.key-btn:hover { opacity: 0.85; }
.key-saved { display: none; font-size: 13px; color: var(--green); margin-top: 8px; }
.input-label { font-size: 13px; color: var(--muted); margin-bottom: 10px; display: block; }
textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 14px; font-size: 15px; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--bg); resize: none; line-height: 1.6; min-height: 130px; }
textarea:focus { outline: none; border-color: var(--text); }
textarea::placeholder { color: #C0BDB5; }
.goal-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.goal-row label { font-size: 13px; color: var(--muted); white-space: nowrap; }
.goal-row input { width: 90px; border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); text-align: center; }
.goal-row input:focus { outline: none; border-color: var(--text); }
.goal-row span { font-size: 13px; color: var(--muted); }
.analyze-btn { width: 100%; padding: 15px; background: var(--text); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-bottom: 1.5rem; transition: opacity 0.15s; }
.analyze-btn:hover { opacity: 0.88; }
.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 14px; display: none; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.results { display: none; }
.results.show { display: block; }
.results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.results-date { font-size: 13px; color: var(--muted); }
.reset-btn { font-size: 13px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: underline; }
.kcal-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
.kcal-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
.kcal-number { font-size: 42px; font-weight: 300; letter-spacing: -2px; line-height: 1; }
.kcal-unit { font-size: 16px; color: var(--muted); }
.kcal-goal { font-size: 13px; color: var(--muted); text-align: right; }
.kcal-goal strong { color: var(--text); font-weight: 500; }
.progress-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; background: var(--text); transition: width 0.8s ease; width: 0%; }
.progress-fill.over { background: #E53E3E; }
.macro-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-bottom: 10px; }
.macro-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem; }
.macro-name { font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.macro-val { font-size: 26px; font-weight: 300; letter-spacing: -1px; }
.macro-unit { font-size: 13px; color: var(--muted); }
.summary-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.summary-text { font-size: 14px; line-height: 1.7; }
.status-badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; }
.badge-good { background: var(--green-bg); color: var(--green); }
.badge-warn { background: var(--amber-bg); color: var(--amber); }
.badge-over { background: var(--red-bg); color: var(--red); }
.history-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.history-item { display: flex; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.history-item:last-child { border-bottom: none; }
.history-day { color: var(--muted); }
.history-val { font-weight: 500; }
.history-empty { font-size: 13px; color: var(--muted); font-style: italic; }
.footer { text-align: center; font-size: 12px; color: var(--muted); padding: 1rem 0 2rem; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>NutriLog</h1>
    <p>Napíš čo si jedol — ja spočítam zvyšok</p>
  </div>



  <div class="card">
    <span class="input-label">Čo si dnes jedol?</span>
    <textarea id="foodInput" placeholder="napr. Raňajky: ovsená kaša s banánom&#10;Obed: kurací rezeň 150g s ryžou&#10;Večera: vajíčka so syrom&#10;Snack: jablko, hrsť orechov"></textarea>
    <div class="goal-row">
      <label>Denný cieľ:</label>
      <input type="number" id="goalInput" value="2000" min="500" max="5000" />
      <span>kcal</span>
    </div>
  </div>

  <button class="analyze-btn" id="analyzeBtn">Analyzovať jedlá</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Analyzujem tvoje jedlá...
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <span class="results-date" id="dateLabel"></span>
      <button class="reset-btn" id="resetBtn">Nový deň</button>
    </div>

    <div class="card">
      <div class="kcal-top">
        <div>
          <div class="kcal-label">Kalórie celkom</div>
          <div class="kcal-number"><span id="kcalVal">0</span> <span class="kcal-unit">kcal</span></div>
        </div>
        <div class="kcal-goal">cieľ <strong id="kcalGoal">2000</strong> kcal</div>
      </div>
      <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div class="macro-grid">
      <div class="macro-card">
        <div class="macro-name">Bielkoviny</div>
        <div class="macro-val"><span id="protVal">0</span> <span class="macro-unit">g</span></div>
      </div>
      <div class="macro-card">
        <div class="macro-name">Sacharidy</div>
        <div class="macro-val"><span id="carbVal">0</span> <span class="macro-unit">g</span></div>
      </div>
      <div class="macro-card">
        <div class="macro-name">Tuky</div>
        <div class="macro-val"><span id="fatVal">0</span> <span class="macro-unit">g</span></div>
      </div>
      <div class="macro-card">
        <div class="macro-name">Vláknina</div>
        <div class="macro-val"><span id="fibVal">0</span> <span class="macro-unit">g</span></div>
      </div>
    </div>

    <div class="card">
      <div class="summary-label">Zhrnutie dňa</div>
      <span class="status-badge" id="statusBadge"></span>
      <div class="summary-text" id="summaryText"></div>
    </div>

    <div class="card">
      <div class="history-label">História</div>
      <div id="historyList"></div>
    </div>
  </div>

  <div class="footer">NutriLog · powered by Groq AI</div>
</div>

<script>
var STORAGE_KEY = 'nutrilog_history';
var API_KEY_STORAGE = 'nutrilog_groq_key';

function getKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}

;

document.getElementById('resetBtn').addEventListener('click', function() {
  document.getElementById('foodInput').value = '';
  document.getElementById('results').classList.remove('show');
});

document.getElementById('analyzeBtn').addEventListener('click', function() {
  analyze();
});

window.addEventListener('load', function() {
  if (getKey()) {
    document.getElementById('setupCard').style.display = 'none';
  }
  renderHistory();
  var days = ['Nedeľa','Pondelok','Utorok','Streda','Štvrtok','Piatok','Sobota'];
  var months = ['januára','februára','marca','apríla','mája','júna','júla','augusta','septembra','októbra','novembra','decembra'];
  var now = new Date();
  document.getElementById('dateLabel').textContent = days[now.getDay()] + ', ' + now.getDate() + '. ' + months[now.getMonth()];
});

async function analyze() {
  var key = getKey();
  
  var food = document.getElementById('foodInput').value.trim();
  if (!food) {
    alert('Najprv napíš čo si jedol.');
    return;
  }
  var goal = parseInt(document.getElementById('goalInput').value) || 2000;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').classList.remove('show');
  document.getElementById('analyzeBtn').disabled = true;

  var prompt = 'Používateľ zjedol toto: "' + food + '"\n\nVráť IBA JSON bez markdown a bez komentárov:\n{\n  "kcal": 1800,\n  "protein": 95,\n  "carbs": 180,\n  "fat": 55,\n  "fiber": 22,\n  "summary": "2-3 vety po slovensky",\n  "status": "good"\n}\n\nStatus: good=vyvážený, warn=niečo chýba, over=nad ' + goal + ' kcal.';

  try {
    var res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
    
      },
      body: JSON.stringify({
        food: food,
        goal: goal
      })
    });

    var data = await res.json();
    if (data.error) {
      alert('Chyba API: ' + data.error.message);
      return;
    }

    var d = data;

    document.getElementById('kcalVal').textContent = d.kcal.toLocaleString('sk');
    document.getElementById('protVal').textContent = Math.round(d.protein);
    document.getElementById('carbVal').textContent = Math.round(d.carbs);
    document.getElementById('fatVal').textContent = Math.round(d.fat);
    document.getElementById('fibVal').textContent = Math.round(d.fiber);
    document.getElementById('summaryText').textContent = d.summary;
    document.getElementById('kcalGoal').textContent = goal.toLocaleString('sk');

    var pct = Math.min(Math.round((d.kcal / goal) * 100), 100);
    var fill = document.getElementById('progressFill');
    fill.style.width = pct + '%';
    if (d.kcal > goal) {
      fill.classList.add('over');
    } else {
      fill.classList.remove('over');
    }

    var badge = document.getElementById('statusBadge');
    if (d.status === 'good') {
      badge.textContent = '✓ Vyvážený deň';
      badge.className = 'status-badge badge-good';
    } else if (d.status === 'warn') {
      badge.textContent = '⚠ Niečo chýba';
      badge.className = 'status-badge badge-warn';
    } else {
      badge.textContent = '↑ Nad cieľom';
      badge.className = 'status-badge badge-over';
    }

    saveToHistory(d.kcal);
    renderHistory();
    document.getElementById('results').classList.add('show');

  } catch(e) {
    alert('Nastala chyba. Skontroluj API kľúč alebo skús znova.');
    console.error(e);
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function saveToHistory(kcal) {
  var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  var today = new Date().toLocaleDateString('sk');
  var existing = history.findIndex(function(h) { return h.date === today; });
  if (existing >= 0) {
    history[existing].kcal = kcal;
  } else {
    history.unshift({ date: today, kcal: kcal });
  }
  if (history.length > 7) history.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
}

function renderHistory() {
  var history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  var list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">Zatiaľ žiadna história</div>';
    return;
  }
  list.innerHTML = history.map(function(h) {
    return '<div class="history-item"><span class="history-day">' + h.date + '</span><span class="history-val">' + h.kcal.toLocaleString('sk') + ' kcal</span></div>';
  }).join('');
}
</script>
</body>
</html>
